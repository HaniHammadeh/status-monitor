apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-monitor
  namespace: dev
  labels:
    app: status-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: status-monitor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: status-monitor
    spec:
      containers:
        - name: status-monitor
          image: hanihammadeh/status-monitor:initial
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
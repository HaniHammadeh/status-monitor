apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: dev

spec:
  serviceName: db
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: postgres-secret

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - statususer
                - -d
                - statusdb
            initialDelaySeconds: 5
            periodSeconds: 5

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc